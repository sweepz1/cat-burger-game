<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>🐱 Purrsuit of the Burger 🍔</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; image-rendering:pixelated; -webkit-tap-highlight-color:transparent; }
    html,body { width:100%; height:100%; background:#0a0a1a; overflow:hidden; touch-action:none; user-select:none; -webkit-user-select:none; }
    body { display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:'Press Start 2P',monospace; color:#fff; }

    /* TITLE */
    #title-screen { text-align:center; position:absolute; z-index:10; padding:20px; width:100%; }
    #title-screen h1 { font-size:clamp(13px,4vw,22px); color:#ffdd57; text-shadow:3px 3px #b35000,6px 6px #000; margin-bottom:16px; line-height:1.7; animation:pulse 1.2s infinite alternate; }
    #title-screen .sub { font-size:clamp(6px,1.8vw,9px); color:#aef; margin-bottom:28px; line-height:2; }
    #title-screen .start-btn { font-family:'Press Start 2P',monospace; font-size:clamp(9px,2.5vw,12px); background:#ffdd57; color:#000; border:3px solid #b35000; padding:12px 24px; cursor:pointer; animation:blink 0.8s infinite; }
    #title-screen .score-btn { font-family:'Press Start 2P',monospace; font-size:clamp(7px,2vw,10px); background:#444; color:#fff; border:3px solid #222; padding:8px 16px; cursor:pointer; margin-top:10px; display:inline-block; }
    #title-screen .controls { font-size:clamp(5px,1.4vw,7px); color:#777; margin-top:20px; line-height:2.4; }
    #title-screen .mobile-hint { color:#aaa; display:block; margin-top:6px; }
    @keyframes pulse { from{text-shadow:3px 3px #b35000,6px 6px #000} to{text-shadow:3px 3px #ff6600,6px 6px #000} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* GAME */
    #game-wrapper { position:relative; display:none; flex-direction:column; align-items:center; width:100%; height:100%; }
    #hud { display:flex; justify-content:space-between; width:100%; max-width:800px; padding:6px 10px; background:#111; border-bottom:2px solid #333; font-size:clamp(6px,1.8vw,9px); color:#ffdd57; flex-shrink:0; }
    #canvas-container { position:relative; flex:1; width:100%; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    #game-canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges; }

    /* OVERLAY & LEADERBOARD MODALS */
    #overlay, #save-modal, #lb-panel { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.85); z-index:100; padding:20px; text-align:center; }
    #overlay h2, #save-modal h2, #lb-panel h2 { font-size:clamp(14px,4vw,22px); color:#ffdd57; margin-bottom:16px; text-shadow:3px 3px #000; }
    #overlay p, #save-modal p { font-size:clamp(6px,1.8vw,9px); color:#ccc; margin-bottom:8px; line-height:2; white-space:pre-line; }
    #overlay button, #save-modal button, #lb-panel button { font-family:'Press Start 2P',monospace; font-size:clamp(8px,2.2vw,11px); background:#ffdd57; color:#000; border:3px solid #b35000; padding:12px 22px; cursor:pointer; margin-top:16px; }
    
    #username-input { font-family:'Press Start 2P'; font-size:12px; padding:10px; background:#000; color:#ffdd57; border:2px solid #ffdd57; text-align:center; margin-bottom:15px; text-transform:uppercase; outline:none; }
    #lb-table { width:90%; max-width:400px; margin:15px 0; border-collapse:collapse; color:#fff; font-size:8px; }
    #lb-table td { padding:10px; border-bottom:1px solid #333; }
    #lb-table tr:first-child td { color:#ffdd57; }

    /* TOUCH CONTROLS */
    #touch-controls { display:none; position:absolute; bottom:0; left:0; right:0; height:150px; pointer-events:none; z-index:8; }
    .touch-btn { position:absolute; pointer-events:all; background:rgba(255,255,255,0.12); border:2px solid rgba(255,255,255,0.3); border-radius:10px; display:flex; align-items:center; justify-content:center; flex-direction:column; font-family:'Press Start 2P',monospace; font-size:20px; color:rgba(255,255,255,0.75); cursor:pointer; user-select:none; -webkit-user-select:none; transition:background 0.07s,border-color 0.07s; }
    .touch-btn.pressed, .touch-btn:active { background:rgba(255,221,87,0.32); border-color:#ffdd57; color:#ffdd57; }
    #btn-left  { left:14px;  bottom:22px; width:72px; height:72px; }
    #btn-right { left:100px; bottom:22px; width:72px; height:72px; }
    #btn-jump  { right:18px; bottom:18px; width:96px; height:96px; font-size:24px; background:rgba(255,221,87,0.14); border-color:rgba(255,221,87,0.45); border-radius:50%; }
    #btn-jump span { font-size:8px; margin-top:2px; }
  </style>
</head>
<body>

<div id="title-screen">
  <h1>🐱 PURRSUIT<br>OF THE<br>BURGER 🍔</h1>
  <p class="sub">A hungry cat. A distant burger.<br>One epic quest.</p>
  <button class="start-btn" onclick="startGame()">▶ START GAME</button><br>
  <button class="score-btn" onclick="openLeaderboard()">🏆 GLOBAL SCORES</button>
  <div class="controls">
    ← → MOVE &nbsp;|&nbsp; SPACE / ↑ JUMP &nbsp;|&nbsp; DOUBLE JUMP!
    <span class="mobile-hint">📱 On mobile: use on-screen buttons</span>
  </div>
</div>

<div id="game-wrapper">
  <div id="hud">
    <span>SCORE: <span id="score-val">0</span></span>
    <span>LEVEL: <span id="level-val">1</span></span>
    <span>❤️ <span id="lives-val">3</span></span>
  </div>
  <div id="canvas-container">
    <canvas id="game-canvas" width="800" height="450"></canvas>
    
    <div id="overlay">
      <h2 id="overlay-title">PAUSED</h2>
      <p id="overlay-msg"></p>
      <button id="overlay-btn" onclick="overlayAction()">CONTINUE</button>
    </div>

    <div id="save-modal">
      <h2>NEW RECORD!</h2>
      <p id="final-score-msg"></p>
      <input type="text" id="username-input" maxlength="10" placeholder="NAME">
      <button onclick="submitScore()">SAVE SCORE</button>
    </div>

    <div id="lb-panel">
      <h2>TOP CATS</h2>
      <table id="lb-table"><tbody id="lb-body"></tbody></table>
      <button onclick="closeLeaderboard()">CLOSE</button>
    </div>

    <div id="touch-controls">
      <div class="touch-btn" id="btn-left">◀</div>
      <div class="touch-btn" id="btn-right">▶</div>
      <div class="touch-btn" id="btn-jump">▲<span>JUMP</span></div>
    </div>
  </div>
</div>

<script>
// ─── CANVAS ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
const GAME_W = 800, GAME_H = 450;

const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

function resizeCanvas() {
  const container = document.getElementById('canvas-container');
  const controlH = isTouchDevice ? 155 : 0;
  const availW = container.clientWidth;
  const availH = container.clientHeight - controlH;
  const scale = Math.min(availW / GAME_W, availH / GAME_H);
  canvas.style.width  = Math.floor(GAME_W * scale) + 'px';
  canvas.style.height = Math.floor(GAME_H * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 300));

if (isTouchDevice) document.getElementById('touch-controls').style.display = 'block';

// ─── PALETTE ───────────────────────────────────────────────────────────────
const PAL = {
  sky1:'#1a1a2e', sky2:'#16213e', ground:'#3d2b1f', groundTop:'#5c3d2e',
  grass:'#2d7a3a', platA:'#4a3728', platB:'#6b5040', star:'#fffde0',
  catBody:'#d4a96a', catDark:'#b8864e', catStripe:'#8a5c2e', eye:'#1a1a1a', eyeShine:'#fff',
  burgerBun:'#d4a043', burgerMeat:'#8b2500', burgerLettuce:'#3a8a00', burgerCheese:'#f7c948',
  coinY:'#ffd700', coinR:'#c8a000', enemyBody:'#cc4444', enemyDark:'#882222',
  particleColors:['#ffdd57','#ff9900','#ff5555','#aaffaa'],
};

// ─── GLOBAL LEADERBOARD LOGIC ─────────────────────────────────────────────
const API_URL = '/api/scores';
let currentFinalScore = 0;

async function openLeaderboard() {
  document.getElementById('lb-panel').style.display = 'flex';
  const body = document.getElementById('lb-body');
  body.innerHTML = '<tr><td colspan="2" style="text-align:center;">Loading...</td></tr>';
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    body.innerHTML = data.map((s, i) => `<tr><td>${i+1}. ${s.name}</td><td style="text-align:right">${s.score}</td></tr>`).join('');
  } catch (e) { body.innerHTML = '<tr><td colspan="2" style="text-align:center;">Offline</td></tr>'; }
}

function closeLeaderboard() { document.getElementById('lb-panel').style.display = 'none'; }

async function submitScore() {
  const name = document.getElementById('username-input').value.toUpperCase() || 'CAT';
  await fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ name, score: currentFinalScore })
  });
  document.getElementById('save-modal').style.display = 'none';
  openLeaderboard();
}

function triggerLeaderboardFlow(finalScore) {
  currentFinalScore = finalScore;
  document.getElementById('final-score-msg').innerText = "FINAL SCORE: " + finalScore;
  document.getElementById('save-modal').style.display = 'flex';
}

// ─── STATE ─────────────────────────────────────────────────────────────────
let gameState = 'idle', score = 0, lives = 3, level = 1, overlayCallback = null;
let stars = [], particles = [], floatingTexts = [];

// ─── INPUT ─────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  if (['ArrowLeft','ArrowRight','ArrowUp','Space'].includes(e.code)) e.preventDefault();
  if (!keys[e.code]) { keys[e.code] = true; if (gameState==='playing'&&(e.code==='ArrowUp'||e.code==='Space')) player.tryJump(); }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function setupTouchBtn(id, leftKey, rightKey, jumpOnDown) {
  const el = document.getElementById(id);
  const dn = () => { if(leftKey) keys[leftKey]=true; if(rightKey) keys[rightKey]=true; el.classList.add('pressed'); if(jumpOnDown&&gameState==='playing') player.tryJump(); };
  const up = () => { if(leftKey) keys[leftKey]=false; if(rightKey) keys[rightKey]=false; el.classList.remove('pressed'); };
  el.addEventListener('touchstart', e=>{e.preventDefault();dn();},{passive:false});
  el.addEventListener('touchend',   e=>{e.preventDefault();up();},{passive:false});
  el.addEventListener('touchcancel',e=>{e.preventDefault();up();},{passive:false});
  el.addEventListener('mousedown',  dn);
  el.addEventListener('mouseup',    up);
  el.addEventListener('mouseleave', up);
}
setupTouchBtn('btn-left',  'ArrowLeft',  null, false);
setupTouchBtn('btn-right', 'ArrowRight', null, false);
setupTouchBtn('btn-jump',  null, null, true);

// ─── WORLD ─────────────────────────────────────────────────────────────────
const TILE = 32, W = GAME_W, H = GAME_H, GROUND_Y = H - TILE * 2;

function genLevel(lvl) {
  const p = [];
  for (let x=0; x<W+200; x+=TILE) p.push({x,y:GROUND_Y,w:TILE,h:TILE*2,type:'ground'});
  for (let i=0; i<5+lvl*2; i++) {
    const w=(3+Math.floor(Math.random()*3))*TILE;
    const x=300+i*200+Math.floor(Math.random()*80);
    const y=GROUND_Y-(2+Math.floor(Math.random()*4))*TILE;
    p.push({x,y,w,h:TILE,type:'platform'});
  }
  return p;
}
function genCoins(plats) {
  const c=[];
  plats.filter(p=>p.type==='platform').forEach(p=>{
    const n=1+Math.floor(Math.random()*3);
    for(let i=0;i<n;i++) c.push({x:p.x+16+i*28,y:p.y-20,r:8,collected:false,bob:Math.random()*Math.PI*2});
  });
  return c;
}
function genEnemies(plats,lvl) {
  return plats.filter(p=>p.type==='platform'&&p.w>=TILE*3).slice(0,2+lvl).map(p=>({
    x:p.x+16,y:p.y-28,w:28,h:28,vx:(1+lvl*0.3)*(Math.random()<0.5?1:-1),
    platform:p,alive:true,frame:0,frameTimer:0
  }));
}

// ─── PLAYER ────────────────────────────────────────────────────────────────
const player = {
  x:80,y:GROUND_Y-40,w:32,h:32,vx:0,vy:0,onGround:false,jumpsLeft:2,
  facing:1,frame:0,frameTimer:0,invincible:0,
  tryJump() { if(this.jumpsLeft>0){this.vy=-13;this.jumpsLeft--;spawnFx(this.x+this.w/2,this.y+this.h,'#aef',5);} },
  reset() { this.x=80;this.y=GROUND_Y-40;this.vx=0;this.vy=0;this.onGround=false;this.jumpsLeft=2;this.invincible=0; }
};

let camX=0, platforms, coins, enemies, burger, levelWidth;

function loadLevel(lvl) {
  platforms=genLevel(lvl); coins=genCoins(platforms); enemies=genEnemies(platforms,lvl);
  levelWidth=platforms.reduce((m,p)=>Math.max(m,p.x+p.w),0)+200;
  const last=platforms.filter(p=>p.type==='platform').sort((a,b)=>b.x-a.x)[0];
  burger={x:last?last.x+last.w/2-20:levelWidth-100, y:last?last.y-48:GROUND_Y-48, w:40,h:40,bob:0,collected:false};
  player.reset(); camX=0;
}

// ─── PARTICLES / FX ────────────────────────────────────────────────────────
function spawnFx(x,y,color,n=8) {
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,color:color||PAL.particleColors[~~(Math.random()*4)],size:3+Math.random()*4});}
}
function floatText(x,y,text,color='#ffdd57'){floatingTexts.push({x,y,text,color,life:1,vy:-1.5});}

// ─── COLLISION ─────────────────────────────────────────────────────────────
const overlap=(a,b)=>a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;

function resolvePlayer() {
  if(keys['ArrowLeft']) {player.vx-=4.5*0.4;player.facing=-1;}
  if(keys['ArrowRight']){player.vx+=4.5*0.4;player.facing=1;}
  player.vx*=0.8; player.vy+=0.6;
  player.x+=player.vx; player.y+=player.vy;
  player.onGround=false;
  for(const p of platforms){
    const prev=player.y+player.h-player.vy;
    if(player.x+player.w>p.x&&player.x<p.x+p.w){
      if(prev<=p.y&&player.y+player.h>=p.y&&player.vy>0){player.y=p.y-player.h;player.vy=0;player.onGround=true;player.jumpsLeft=2;}
      if(player.y<p.y+p.h&&player.y+player.h>p.y+p.h&&player.vy<0){player.y=p.y+p.h;player.vy=0;}
    }
  }
  if(player.y>H+100) loseLife();
  if(player.x<0){player.x=0;player.vx=0;}
}

// ─── UPDATE ────────────────────────────────────────────────────────────────
let lastTime=0;
function update(ts){
  const dt=Math.min((ts-lastTime)/16.67,3); lastTime=ts;
  if(gameState!=='playing') return;
  resolvePlayer();
  camX+=(player.x-W/3-camX)*0.12;
  camX=Math.max(0,Math.min(camX,levelWidth-W));

  for(const e of enemies){
    if(!e.alive) continue;
    e.x+=e.vx;
    if(e.x<e.platform.x||e.x+e.w>e.platform.x+e.platform.w) e.vx*=-1;
    if(++e.frameTimer>12){e.frame=(e.frame+1)%2;e.frameTimer=0;}
    if(player.invincible<=0&&overlap({x:player.x,y:player.y,w:player.w,h:player.h},{x:e.x,y:e.y,w:e.w,h:e.h})){
      if(player.vy>0&&player.y+player.h<e.y+e.h*0.6){
        e.alive=false;player.vy=-9;score+=100;spawnFx(e.x+e.w/2,e.y,'#ff5555',12);floatText(e.x,e.y-20,'+100');
      } else loseLife();
    }
  }
  for(const c of coins){
    if(c.collected) continue; c.bob+=0.08;
    const cb={x:c.x-c.r,y:c.y-c.r+Math.sin(c.bob)*4,w:c.r*2,h:c.r*2};
    if(overlap({x:player.x,y:player.y,w:player.w,h:player.h},cb)){c.collected=true;score+=10;spawnFx(c.x,c.y,PAL.coinY,6);floatText(c.x,c.y-16,'+10','#ffd700');}
  }
  if(!burger.collected){
    burger.bob+=0.05;
    const bb={x:burger.x,y:burger.y+Math.sin(burger.bob)*5,w:burger.w,h:burger.h};
    if(overlap({x:player.x,y:player.y,w:player.w,h:player.h},bb)){
      burger.collected=true;score+=500;spawnFx(burger.x+burger.w/2,burger.y,'#ffdd57',30);
      floatText(burger.x,burger.y-20,'+500 BURGER!','#ffdd57');
      setTimeout(()=>showOverlay('WIN!',`LEVEL ${level} COMPLETE!\nSCORE: ${score}`,'NEXT LEVEL',nextLevel),1200);
    }
  }
  if(Math.abs(player.vx)>0.3){if(++player.frameTimer>8){player.frame=(player.frame+1)%4;player.frameTimer=0;}}else player.frame=0;
  if(player.invincible>0) player.invincible--;
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.04;return p.life>0;});
  floatingTexts=floatingTexts.filter(t=>{t.y+=t.vy;t.life-=0.02;return t.life>0;});
  updateHUD();
}

function loseLife(){
  lives--;player.invincible=120;player.vy=-10;spawnFx(player.x+player.w/2,player.y,'#ff5555',15);
  if(lives<=0){
    gameState='gameover';
    setTimeout(()=>triggerLeaderboardFlow(score),600);
  }
  updateHUD();
}
function nextLevel(){level++;loadLevel(level);gameState='playing';}
function restartGame(){score=0;lives=3;level=1;loadLevel(1);gameState='playing';updateHUD();}
function updateHUD(){document.getElementById('score-val').textContent=score;document.getElementById('level-val').textContent=level;document.getElementById('lives-val').textContent=lives;}

// ─── OVERLAY ───────────────────────────────────────────────────────────────
function showOverlay(title,msg,btnText,cb){
  document.getElementById('overlay-title').textContent=title;
  document.getElementById('overlay-msg').textContent=msg;
  document.getElementById('overlay-btn').textContent=btnText;
  overlayCallback=cb;
  document.getElementById('overlay').style.display='flex';
}
function overlayAction(){document.getElementById('overlay').style.display='none';if(overlayCallback)overlayCallback();}

// ─── DRAW ──────────────────────────────────────────────────────────────────
const r=Math.round;

function drawPlatform(p){
  const sx=p.x-camX;
  if(p.type==='ground'){
    ctx.fillStyle=PAL.grass;    ctx.fillRect(r(sx),r(p.y),p.w,6);
    ctx.fillStyle=PAL.groundTop;ctx.fillRect(r(sx),r(p.y+6),p.w,8);
    ctx.fillStyle=PAL.ground;   ctx.fillRect(r(sx),r(p.y+14),p.w,p.h-14);
  } else {
    ctx.fillStyle=PAL.platA;ctx.fillRect(r(sx),r(p.y),p.w,p.h);
    ctx.fillStyle=PAL.platB;ctx.fillRect(r(sx),r(p.y),p.w,6);
    ctx.fillStyle='#2a1a10';
    for(let bx=0;bx<p.w;bx+=16) ctx.fillRect(r(sx+bx),r(p.y+6),1,p.h-6);
    ctx.fillRect(r(sx),r(p.y+p.h/2),p.w,1);
  }
}

function drawCat(x,y,facing,frame,inv){
  if(inv>0&&Math.floor(inv/6)%2===0) return;
  ctx.save();ctx.translate(r(x+16),r(y+16));if(facing<0)ctx.scale(-1,1);
  ctx.fillStyle=PAL.catBody;  ctx.fillRect(-12,-8,24,20);
  ctx.fillStyle=PAL.catStripe;ctx.fillRect(-4,-8,3,14);ctx.fillRect(4,-6,3,12);
  ctx.fillStyle=PAL.catBody;  ctx.fillRect(-10,-20,20,16);
  ctx.fillStyle=PAL.catDark;  ctx.fillRect(-10,-28,6,10);ctx.fillRect(4,-28,6,10);
  ctx.fillStyle='#ffaaaa';    ctx.fillRect(-8,-26,4,7);ctx.fillRect(6,-26,4,7);
  ctx.fillStyle=PAL.eye;      ctx.fillRect(-6,-16,4,4);ctx.fillRect(2,-16,4,4);
  ctx.fillStyle=PAL.eyeShine; ctx.fillRect(-5,-15,2,2);ctx.fillRect(3,-15,2,2);
  ctx.fillStyle='#ffaacc';    ctx.fillRect(-1,-11,2,2);
  ctx.fillStyle='#fff';
  ctx.fillRect(-16,-12,7,1);ctx.fillRect(-16,-10,7,1);ctx.fillRect(9,-12,7,1);ctx.fillRect(9,-10,7,1);
  const tw=Math.sin(Date.now()*0.008+frame)*5;
  ctx.fillStyle=PAL.catBody;ctx.fillRect(12,tw,8,4);ctx.fillRect(18,-4+tw,4,8);
  ctx.fillStyle=PAL.catDark;
  const lo=Math.sin(frame*1.5)*4;
  ctx.fillRect(-10,12,5,8+lo);ctx.fillRect(-2,12,5,8-lo);ctx.fillRect(5,12,5,8+lo);
  ctx.restore();
}

function drawBurger(x,y,bob){
  const by=y+Math.sin(bob)*5;
  ctx.save();ctx.translate(r(x+20),r(by+20));
  ctx.globalAlpha=0.18+0.1*Math.sin(bob*2);ctx.fillStyle='#ffdd57';ctx.beginPath();ctx.arc(0,0,26,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  ctx.fillStyle=PAL.burgerBun;ctx.fillRect(-16,-18,32,10);
  ctx.fillStyle='#e8b84b';ctx.fillRect(-14,-22,28,6);ctx.fillRect(-10,-26,20,5);
  ctx.fillStyle='#fff';ctx.fillRect(-8,-24,3,2);ctx.fillRect(2,-24,3,2);ctx.fillRect(-3,-22,3,2);
  ctx.fillStyle=PAL.burgerLettuce;ctx.fillRect(-18,-8,36,6);
  ctx.fillStyle=PAL.burgerCheese;ctx.fillRect(-15,-4,30,4);
  ctx.fillStyle=PAL.burgerMeat;ctx.fillRect(-14,0,28,8);
  ctx.fillStyle='#6b1a00';ctx.fillRect(-14,0,28,2);
  ctx.fillStyle=PAL.burgerBun;ctx.fillRect(-15,8,30,8);
  ctx.fillStyle='#c49030';ctx.fillRect(-15,14,30,2);
  ctx.restore();
}

function drawCoin(c){
  const by=c.y+Math.sin(c.bob)*4;
  ctx.fillStyle=PAL.coinY;ctx.fillRect(r(c.x-camX-c.r),r(by-c.r),c.r*2,c.r*2);
  ctx.fillStyle=PAL.coinR;ctx.fillRect(r(c.x-camX-c.r+2),r(by-c.r+2),c.r*2-4,c.r*2-4);
  ctx.fillStyle='#ffe566';ctx.fillRect(r(c.x-camX-2),r(by-c.r+2),3,4);
}

function drawEnemy(e){
  ctx.save();ctx.translate(r(e.x-camX+e.w/2),r(e.y+e.h/2));if(e.vx<0)ctx.scale(-1,1);
  ctx.fillStyle=PAL.enemyBody;ctx.fillRect(-12,-10,24,20);ctx.fillRect(-10,-20,20,14);
  ctx.fillStyle=PAL.enemyDark;ctx.fillRect(-9,-26,5,8);ctx.fillRect(4,-26,5,8);
  ctx.fillStyle='#fff';ctx.fillRect(-7,-16,5,5);ctx.fillRect(2,-16,5,5);
  ctx.fillStyle='#f00';ctx.fillRect(-5+e.frame*2,-15,3,3);ctx.fillRect(3+e.frame*2,-15,3,3);
  ctx.fillStyle='#000';ctx.fillRect(-5,-7,10,3);
  ctx.fillStyle='#fff';ctx.fillRect(-3,-7,2,3);ctx.fillRect(1,-7,2,3);
  ctx.fillStyle=PAL.enemyDark;ctx.fillRect(-9,10,6,8);ctx.fillRect(3,10,6,8);
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // sky
  const grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,PAL.sky1);grad.addColorStop(1,PAL.sky2);
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  // stars
  stars.forEach(s=>{const px2=((s.x-camX*s.speed)%W+W)%W;ctx.globalAlpha=0.4+0.4*Math.sin(Date.now()*0.001+s.phase);ctx.fillStyle=PAL.star;ctx.fillRect(px2,s.y,s.size,s.size);ctx.globalAlpha=1;});
  // moon
  const mx=W*0.8-camX*0.02;ctx.fillStyle='#fffde0';ctx.globalAlpha=0.9;ctx.beginPath();ctx.arc(mx,60,30,0,Math.PI*2);ctx.fill();ctx.fillStyle=PAL.sky1;ctx.beginPath();ctx.arc(mx+10,54,26,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  // platforms
  for(const p of platforms){const sx=p.x-camX;if(sx+p.w<-10||sx>W+10)continue;drawPlatform(p);}
  // coins
  for(const c of coins){if(c.collected)continue;const sx=c.x-camX;if(sx<-20||sx>W+20)continue;drawCoin(c);}
  // burger
  if(!burger.collected){const sx=burger.x-camX;if(sx>-50&&sx<W+50)drawBurger(sx,burger.y,burger.bob);}
  // enemies
  for(const e of enemies){if(!e.alive)continue;const sx=e.x-camX;if(sx<-40||sx>W+40)continue;drawEnemy(e);}
  // player
  drawCat(player.x-camX,player.y,player.facing,player.frame,player.invincible);
  // particles
  for(const p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(r(p.x-camX),r(p.y),r(p.size),r(p.size));ctx.globalAlpha=1;}
  // floating text
  ctx.font='7px "Press Start 2P",monospace';
  for(const t of floatingTexts){ctx.globalAlpha=t.life;ctx.fillStyle=t.color;ctx.fillText(t.text,r(t.x-camX),r(t.y));ctx.globalAlpha=1;}
  // progress bar
  const prog=Math.max(0,Math.min(1,player.x/burger.x));
  ctx.fillStyle='#222';ctx.fillRect(10,10,200,8);ctx.fillStyle='#ffdd57';ctx.fillRect(10,10,200*prog,8);
  ctx.font='5px "Press Start 2P",monospace';ctx.fillStyle='#fff';
  ctx.fillText('🐱',10+200*prog-6,8);ctx.fillText('🍔',206,8);
}

// ─── LOOP ──────────────────────────────────────────────────────────────────
function loop(ts){update(ts);draw();requestAnimationFrame(loop);}

// ─── START ─────────────────────────────────────────────────────────────────
function initStars(){stars=[];for(let i=0;i<80;i++)stars.push({x:Math.random()*W*5,y:Math.random()*H*0.7,size:Math.random()<0.7?1:2,speed:0.05+Math.random()*0.2,phase:Math.random()*Math.PI*2});}

function startGame(){
  document.getElementById('title-screen').style.display='none';
  document.getElementById('game-wrapper').style.display='flex';
  resizeCanvas();
  initStars();loadLevel(1);gameState='playing';updateHUD();
  requestAnimationFrame(ts=>{lastTime=ts;loop(ts);});
}
</script>
</body>
</html>
