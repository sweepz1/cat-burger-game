<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🐱 Purrsuit of the Burger 🍔</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; background: #0a0a1a; overflow: hidden; touch-action: none; user-select: none; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Press Start 2P', monospace; color: #fff; }

    /* --- UI ELEMENTS --- */
    #title-screen { text-align: center; position: absolute; z-index: 10; top: 20%; width: 100%; }
    #title-screen h1 { font-size: clamp(14px, 5vw, 24px); color: #ffdd57; text-shadow: 3px 3px #b35000; margin-bottom: 30px; line-height: 1.6; }
    .pixel-btn { font-family: 'Press Start 2P'; font-size: 14px; background: #ffdd57; color: #000; border: 4px solid #b35000; padding: 15px 25px; cursor: pointer; margin: 10px; }
    
    #game-wrapper { position: relative; display: none; width: 100%; height: 100%; }
    #hud { position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 15px; background: rgba(0,0,0,0.5); color: #ffdd57; z-index: 5; font-size: 10px; }

    /* --- MOBILE CONTROLS --- */
    #touch-controls { display: none; position: absolute; bottom: 20px; left: 0; width: 100%; padding: 0 20px; justify-content: space-between; z-index: 20; }
    .d-pad { display: flex; gap: 15px; }
    .touch-btn { width: 70px; height: 70px; background: rgba(255, 221, 87, 0.2); border: 3px solid #ffdd57; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #ffdd57; }
    .touch-btn:active { background: rgba(255, 221, 87, 0.5); }

    /* --- MODALS --- */
    #save-modal, #lb-panel { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 100; }
    #username-input { font-family: 'Press Start 2P'; padding: 15px; background: #000; color: #ffdd57; border: 3px solid #ffdd57; text-align: center; margin-bottom: 20px; text-transform: uppercase; }
    #lb-table { width: 90%; max-width: 400px; margin: 20px 0; border-collapse: collapse; }
    #lb-table td { padding: 10px; border-bottom: 1px solid #333; font-size: 10px; }
  </style>
</head>
<body>

<div id="title-screen">
  <h1>🐱 CAT BURGER 🍔</h1>
  <button class="pixel-btn" onclick="startGame()">START GAME</button>
  <button class="pixel-btn" style="background:#444; color:#fff;" onclick="openLeaderboard()">SCORES</button>
</div>

<div id="game-wrapper">
  <div id="hud">
    <span>SCORE: <span id="score-val">0</span></span>
    <span>LIVES: <span id="lives-val">3</span></span>
  </div>
  
  <canvas id="game-canvas"></canvas>

  <div id="touch-controls">
    <div class="d-pad">
      <div class="touch-btn" id="btn-left">◀</div>
      <div class="touch-btn" id="btn-right">▶</div>
    </div>
    <div class="touch-btn" id="btn-jump">▲</div>
  </div>
</div>

<div id="save-modal">
  <h2 style="color:#ffdd57">GAME OVER</h2>
  <h3 id="final-score" style="margin: 20px 0;">SCORE: 0</h3>
  <input type="text" id="username-input" maxlength="10" placeholder="NAME">
  <button class="pixel-btn" onclick="submitScore()">SAVE SCORE</button>
</div>

<div id="lb-panel">
  <h2 style="color:#ffdd57">TOP CATS</h2>
  <table id="lb-table"><tbody id="lb-body"></tbody></table>
  <button class="pixel-btn" onclick="closeLeaderboard()">CLOSE</button>
</div>

<script>
/**
 * --- VISUALS & PALETTE (From Uploaded File) ---
 */
const PAL = {
  sky1: '#1a1a2e', sky2: '#16213e', ground: '#3d2b1f', groundTop: '#5c3d2e',
  grass: '#2d7a3a', platA: '#4a3728', platB: '#6b5040', star: '#fffde0',
  catBody: '#d4a96a', catDark: '#b8864e', catStripe: '#8a5c2e', eye: '#1a1a1a', eyeShine: '#fff'
};

/**
 * --- LEADERBOARD API ---
 */
const API_URL = '/api/scores';
let lastScore = 0;

async function openLeaderboard() {
  document.getElementById('lb-panel').style.display = 'flex';
  const body = document.getElementById('lb-body');
  body.innerHTML = 'Loading...';
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    body.innerHTML = data.map((s, i) => `<tr><td>${i+1}. ${s.name}</td><td style="text-align:right">${s.score}</td></tr>`).join('');
  } catch (e) { body.innerHTML = 'Offline'; }
}

function closeLeaderboard() { document.getElementById('lb-panel').style.display = 'none'; }

async function submitScore() {
  const name = document.getElementById('username-input').value.toUpperCase() || 'CAT';
  await fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ name, score: lastScore })
  });
  document.getElementById('save-modal').style.display = 'none';
  openLeaderboard();
}

/**
 * --- GAME CORE ---
 */
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let score = 0, lives = 3, gameState = 'title', camX = 0;
let stars = [];

const player = { x: 100, y: 0, w: 32, h: 32, vx: 0, vy: 0, jumps: 0, facing: 1, inv: 0 };
const platforms = [];
const burger = { x: 4500, y: 0, bob: 0 };

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function initStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * 2000,
      y: Math.random() * canvas.height * 0.7,
      size: Math.random() < 0.7 ? 1 : 2,
      speed: 0.05 + Math.random() * 0.2,
      phase: Math.random() * Math.PI * 2
    });
  }
}

function initGame() {
  platforms.length = 0;
  initStars();
  platforms.push({ x: 0, y: canvas.height - 60, w: 5000, h: 60, type: 'ground' });
  for(let i=0; i<30; i++) {
    platforms.push({ x: 500 + i*180, y: canvas.height - 150 - Math.random()*150, w: 120, h: 20, type: 'plat' });
  }
  burger.y = canvas.height - 100;
  player.y = canvas.height - 150;
}

function update() {
  if (gameState !== 'playing') return;
  player.vy += 0.8; 
  player.x += player.vx;
  player.y += player.vy;
  burger.bob += 0.05;

  // Collision
  let grounded = false;
  platforms.forEach(p => {
    if (player.x < p.x + p.w && player.x + player.w > p.x && 
        player.y + player.h > p.y && player.y + player.h < p.y + p.h + 10 && player.vy > 0) {
      player.y = p.y - player.h;
      player.vy = 0;
      grounded = true;
      player.jumps = 2;
    }
  });

  camX = player.x - canvas.width / 4;
  if (player.x > burger.x) {
    lastScore = score + 500;
    document.getElementById('final-score').innerText = "SCORE: " + lastScore;
    document.getElementById('save-modal').style.display = 'flex';
    gameState = 'over';
  }
}

// Polished Cat Drawing Function
function drawCat(x, y, facing, inv) {
  if (inv > 0 && Math.floor(Date.now() / 100) % 2 === 0) return;
  const r = Math.round;
  ctx.save();
  ctx.translate(r(x + 16), r(y + 16));
  if (facing < 0) ctx.scale(-1, 1);

  ctx.fillStyle = PAL.catBody;  ctx.fillRect(-12, -8, 24, 20); // Body
  ctx.fillStyle = PAL.catStripe; ctx.fillRect(-4, -8, 3, 14); // Stripes
  ctx.fillStyle = PAL.catBody;  ctx.fillRect(-10, -20, 20, 16); // Head
  ctx.fillStyle = PAL.catDark;  ctx.fillRect(-10, -28, 6, 10); ctx.fillRect(4, -28, 6, 10); // Ears
  ctx.fillStyle = '#ffaaaa';    ctx.fillRect(-8, -26, 4, 7); ctx.fillRect(6, -26, 4, 7); // Inner Ear
  ctx.fillStyle = PAL.eye;      ctx.fillRect(-6, -16, 4, 4); ctx.fillRect(2, -16, 4, 4); // Eyes
  ctx.fillStyle = '#fff';       ctx.fillRect(-16, -12, 7, 1); ctx.fillRect(9, -12, 7, 1); // Whiskers
  
  const tw = Math.sin(Date.now() * 0.008) * 5; // Tail Wiggle
  ctx.fillStyle = PAL.catBody; ctx.fillRect(12, tw, 8, 4); ctx.fillRect(18, -4 + tw, 4, 8);
  ctx.restore();
}

function draw() {
  // Sky Gradient
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, PAL.sky1); grad.addColorStop(1, PAL.sky2);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Stars
  stars.forEach(s => {
    const px = ((s.x - camX * s.speed) % canvas.width + canvas.width) % canvas.width;
    ctx.globalAlpha = 0.4 + 0.4 * Math.sin(Date.now() * 0.001 + s.phase);
    ctx.fillStyle = PAL.star; ctx.fillRect(px, s.y, s.size, s.size);
  });
  ctx.globalAlpha = 1.0;

  ctx.save();
  ctx.translate(-camX, 0);

  // Platforms
  platforms.forEach(p => {
    ctx.fillStyle = p.type === 'ground' ? PAL.grass : PAL.platA;
    ctx.fillRect(p.x, p.y, p.w, p.h);
    if(p.type === 'ground') {
      ctx.fillStyle = PAL.groundTop; ctx.fillRect(p.x, p.y + 6, p.w, 8);
    }
  });
  
  // Burger
  ctx.font = "40px Arial";
  ctx.fillText("🍔", burger.x, burger.y + Math.sin(burger.bob) * 10);

  // Player
  drawCat(player.x, player.y, player.facing, player.inv);

  ctx.restore();
}

function loop() {
  update();
  draw();
  if(gameState === 'playing') requestAnimationFrame(loop);
}

function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-wrapper').style.display = 'block';
  if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
    document.getElementById('touch-controls').style.display = 'flex';
  }
  gameState = 'playing';
  initGame();
  loop();
}

// CONTROLS
const handleInput = (type, active) => {
  if(type === 'left') { player.vx = active ? -6 : 0; if(active) player.facing = -1; }
  if(type === 'right') { player.vx = active ? 6 : 0; if(active) player.facing = 1; }
  if(type === 'jump' && active && player.jumps > 0) { player.vy = -15; player.jumps--; }
};

document.getElementById('btn-left').ontouchstart = (e) => { e.preventDefault(); handleInput('left', true); };
document.getElementById('btn-left').ontouchend = () => handleInput('left', false);
document.getElementById('btn-right').ontouchstart = (e) => { e.preventDefault(); handleInput('right', true); };
document.getElementById('btn-right').ontouchend = () => handleInput('right', false);
document.getElementById('btn-jump').ontouchstart = (e) => { e.preventDefault(); handleInput('jump', true); };

window.onkeydown = (e) => {
  if(e.code === 'ArrowLeft') handleInput('left', true);
  if(e.code === 'ArrowRight') handleInput('right', true);
  if(e.code === 'Space') handleInput('jump', true);
};
window.onkeyup = (e) => {
  if(e.code === 'ArrowLeft' || e.code === 'ArrowRight') handleInput('left', false);
};
</script>
</body>
</html>
